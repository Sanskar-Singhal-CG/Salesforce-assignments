<template>
    <lightning-card>
        <template if:true={isLoading}>
            <div class="slds-is-relative slds-m-around_large">
                <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
            </div>
        </template>

        <template if:true={error}>
            <div class="slds-m-around_medium">
                <p class="slds-text-color_error">Error loading portfolio data. Please check the Account record.</p>
            </div>
        </template>

        <template if:true={portfolio}>
            <div class="portfolio-container">

                <!-- Header / Hero Section -->
                <div class="portfolio-hero">
                    <div class="avatar-circle">
                        <span class="avatar-initials">{initials}</span>
                    </div>
                    <h1 class="portfolio-name">{portfolio.Name}</h1>
                    <p class="portfolio-title">{portfolio.Portfolio_Title__c}</p>
                    
                    <!-- Contact Info -->
                    <div class="contact-info">
                        <template if:true={portfolio.Portfolio_Email__c}>
                            <p>{portfolio.Portfolio_Email__c}</p>
                        </template>
                        <template if:true={portfolio.Portfolio_Phone__c}>
                            <p>{portfolio.Portfolio_Phone__c}</p>
                        </template>
                        <template if:true={portfolio.Portfolio_Location__c}>
                            <p>{portfolio.Portfolio_Location__c}</p>
                        </template>
                    </div>

                    <!-- Social Links -->
                    <div class="social-links">
                        <template if:true={portfolio.Portfolio_LinkedIn__c}>
                            <a href={portfolio.Portfolio_LinkedIn__c} target="_blank" class="social-btn linkedin-btn">
                                LinkedIn
                            </a>
                        </template>
                        <template if:true={portfolio.Portfolio_GitHub__c}>
                            <a href={portfolio.Portfolio_GitHub__c} target="_blank" class="social-btn github-btn">
                                GitHub
                            </a>
                        </template>
                    </div>
                </div>

                <!-- About Section -->
                <template if:true={portfolio.Portfolio_Bio__c}>
                    <div class="portfolio-section">
                        <h2 class="section-title">About Me</h2>
                        <p class="section-content">{portfolio.Portfolio_Bio__c}</p>
                    </div>
                </template>

                <!-- Skills Section -->
                <template if:true={skillsList}>
                    <div class="portfolio-section">
                        <h2 class="section-title">Skills</h2>
                        <div class="skills-container">
                            <template for:each={skillsList} for:item="skill">
                                <span key={skill} class="skill-badge">{skill}</span>
                            </template>
                        </div>
                    </div>
                </template>

                <!-- Projects Section -->
                <template if:true={projectsList}>
                    <div class="portfolio-section">
                        <h2 class="section-title">Projects</h2>
                        <template for:each={projectsList} for:item="project">
                            <div key={project.id} class="project-item">
                                <h3 class="project-title">{project.title}</h3>
                                <p class="project-tech">{project.tech}</p>
                                <p class="project-description">{project.description}</p>
                            </div>
                        </template>
                    </div>
                </template>

                <!-- Education Section -->
                <template if:true={portfolio.Portfolio_Education__c}>
                    <div class="portfolio-section">
                        <h2 class="section-title">Education</h2>
                        <p class="section-content">{portfolio.Portfolio_Education__c}</p>
                    </div>
                </template>

                <!-- Certifications Section -->
                <template if:true={certificationsList}>
                    <div class="portfolio-section">
                        <h2 class="section-title">Certifications</h2>
                        <ul class="list-content">
                            <template for:each={certificationsList} for:item="cert">
                                <li key={cert}>{cert}</li>
                            </template>
                        </ul>
                    </div>
                </template>

                <!-- Achievements Section -->
                <template if:true={portfolio.Portfolio_Achievements__c}>
                    <div class="portfolio-section">
                        <h2 class="section-title">Achievements</h2>
                        <p class="section-content">{portfolio.Portfolio_Achievements__c}</p>
                    </div>
                </template>

            </div>
        </template>

        <template if:true={noData}>
            <div class="slds-m-around_medium slds-text-align_center">
                <p>No portfolio account found. Please create an Account with <strong>Is Portfolio</strong> checked.</p>
            </div>
        </template>
    </lightning-card>
</template>
